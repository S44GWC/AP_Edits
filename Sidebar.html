<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.min.css">
  <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>

  <style>
    :root {
      --primary-color: #4285F4;
      --secondary-color: #DB4437;
      /* UPDATED: Main background color changed to #e0e0e0 */
      --background-light: #e0e0e0;
      --surface-color: #FFFFFF;
      --text-dark: #343A40;
      --text-medium: #6C757D;
      --border-color: #E0E0E0;
      --border-light: #EEEEEE;
      --success-bg: #D4EDDA;
      --success-text: #155724;
      --error-bg: #F8D7DA;
      --error-text: #721C24;
      --warning-bg: #FFF3CD;
      --warning-text: #856404;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 15px;
      background-color: var(--background-light);
      color: var(--text-dark);
      line-height: 1.6;
    }

    .mdl-card {
      width: 100%;
      margin-bottom: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      background-color: var(--surface-color);
      box-sizing: border-box;
      overflow: visible; 
    }

    .mdl-card__title {
      color: var(--surface-color);
      background: linear-gradient(135deg, #4285F4 0%, #34A853 100%);
      font-size: 22px;
      font-weight: 600;
      padding: 20px;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    .mdl-card__supporting-text {
      width: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: visible; 
    }

    /* --- FORM ELEMENTS --- */
    
    .input-group {
      margin-bottom: 20px;
    }

    /* The "Title" Label above inputs */
    .custom-label {
      display: block;
      color: var(--primary-color);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: left; /* Explicitly Left Aligned */
    }

    /* UPDATED: The Filter Box Style - Removed background and padding */
    .filter-box {
      background-color: transparent; /* Transparent so it blends with the card */
      padding: 0; /* Removed padding so it aligns left with other inputs */
      margin-bottom: 25px;
      text-align: left; 
    }
    .filter-box .input-group {
      margin-bottom: 0; 
    }

    /* MDL Override */
    .mdl-textfield {
      width: 100%;
      padding: 0;
      margin: 0;
      display: block;
    }
    .mdl-textfield__label {
      display: none; 
    }

    /* Input Fields styling */
    .mdl-textfield__input {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: var(--text-dark);
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light); 
      text-align: left; /* Explicitly Left Aligned */
    }
    .mdl-textfield__input:focus {
      box-shadow: none;
      border-bottom: 2px solid var(--primary-color);
    }
    
    /* Fix for "Input is not a number" */
    .mdl-textfield__error {
      color: var(--error-text);
      font-size: 12px;
      margin-top: 4px;
      visibility: hidden; 
      width: 100%;
    }
    .mdl-textfield.is-invalid .mdl-textfield__error {
      visibility: visible; 
    }

    /* Select Fields (Dropdowns) */
    .select-wrapper {
      position: relative;
    }
    .select-wrapper select {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border-color);
      background: transparent;
      border-radius: 0;
      padding: 8px 20px 8px 0; 
      font-size: 16px;
      color: var(--text-dark);
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }
    .select-wrapper select:focus {
      outline: none;
      border-bottom: 2px solid var(--primary-color);
    }
    .select-wrapper:after {
      content: 'arrow_drop_down';
      font-family: 'Material Icons';
      color: var(--text-medium);
      position: absolute;
      right: 0;
      top: 5px;
      font-size: 24px;
      pointer-events: none;
    }

    /* Buttons */
    .button-bar {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    .mdl-button {
      flex: 1;
      border-radius: 6px;
      text-transform: capitalize;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      height: 40px;
    }
    .mdl-button--colored {
      background-color: var(--primary-color) !important;
      color: white !important;
    }
    .mdl-button--accent {
      background-color: var(--secondary-color) !important;
      color: white !important;
    }
    .mdl-button--pause {
      background-color: #FFA000 !important;
      color: white !important;
    }

    /* Feedback & Timer */
    #feedback {
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
    }
    .feedback-success { background-color: var(--success-bg); color: var(--success-text); }
    .feedback-error { background-color: var(--error-bg); color: var(--error-text); }
    .hidden { display: none; }
    
    .timer {
      font-weight: 700;
      font-size: 2em;
      color: var(--secondary-color);
      text-align: center;
      display: block;
      margin: 10px 0 20px 0;
    }
    
    #activeJobStatus {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .status-open { background-color: #E6F4EA; color: #1E8E3E; }
    .status-paused { background-color: #FEF7E0; color: #B06000; }

  </style>
</head>
<body>

  <div class="mdl-card">
    <div class="mdl-card__title">
      Log New Job
    </div>
    <div class="mdl-card__supporting-text">
      <form id="logEditForm">
        
        <div class="filter-box">
          <div class="input-group">
            <label class="custom-label" for="schoolFilterInput">Filter School Code + Name</label>
            <div class="mdl-textfield mdl-js-textfield">
              <input class="mdl-textfield__input" type="text" id="schoolFilterInput" placeholder="Type to search...">
            </div>
          </div>
        </div>

        <div class="input-group">
          <label class="custom-label" for="schoolSelect">School Code + Name</label>
          <div class="select-wrapper">
            <select id="schoolSelect" name="school" required>
              <option value="">Select a school...</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label class="custom-label" for="editorSelect">Editor</label>
          <div class="select-wrapper">
            <select id="editorSelect" name="editor" required>
              <option value="">Select an editor...</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label class="custom-label" for="styleSelect">Shoot Style</label>
          <div class="select-wrapper">
            <select id="styleSelect" name="style" required>
              <option value="">Select a style...</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label class="custom-label" for="classesInput">Number of Classes</label>
          <div class="mdl-textfield mdl-js-textfield">
            <input class="mdl-textfield__input" type="text" pattern="-?[0-9]*(\.[0-9]+)?" id="classesInput" name="classes" value="1" required>
            <span class="mdl-textfield__error">Input is not a number!</span>
          </div>
        </div>

        <label class="mdl-checkbox mdl-js-checkbox mdl-js-ripple-effect" for="reeditCheckbox">
          <input type="checkbox" id="reeditCheckbox" class="mdl-checkbox__input" name="reedit">
          <span class="mdl-checkbox__label">Re-edit?</span>
        </label>

        <div class="button-bar">
          <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored mdl-js-ripple-effect">
            Log New Job
          </button>
        </div>

      </form>
    </div>
  </div>

  <div id="activeJobDisplay" class="mdl-card">
    <div class="mdl-card__title">
      Active Job Selection
    </div>
    <div class="mdl-card__supporting-text">
        <p id="activeJobMessage" style="margin-bottom: 15px;">No active job selected. Select one below to manage:</p>
        
        <div class="input-group">
            <label class="custom-label" for="activeJobSelect">Select Active Job</label>
            <div class="select-wrapper">
                <select id="activeJobSelect">
                    <option value="">No active jobs</option>
                </select>
            </div>
        </div>
        
        <div id="currentJobDetails" class="hidden">
            <div style="margin-bottom: 5px;">
              <strong>School:</strong> <span id="activeJobSchool"></span>
            </div>
            <div style="margin-bottom: 10px;">
              <strong>Editor:</strong> <span id="activeJobEditor"></span>
            </div>
            
            <span id="activeJobStatus"></span> 
            
            <div style="font-size: 12px; color: #666;">
              Total Paused: <span id="totalPausedDurationDisplay">00:00</span>
            </div> 
            
            <div style="margin-top: 15px; font-weight: 500;">Work Time Elapsed:</div>
            <span id="elapsedTime" class="timer">00:00:00</span>
            
            <div class="button-bar">
              <button id="pauseJobButton" class="mdl-button mdl-js-button mdl-button--raised mdl-button--pause mdl-js-ripple-effect hidden">
                Pause
              </button>
              <button id="resumeJobButton" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect hidden">
                Resume
              </button>
              <button id="endJobButton" class="mdl-button mdl-js-button mdl-button--raised mdl-button--accent mdl-js-ripple-effect hidden">
                End Job
              </button>
            </div>
        </div>
    </div>
  </div>

  <div id="feedback" class="hidden"></div>

  <script>
    let activeJob = null; 
    let allOpenJobs = []; 
    let timerInterval = null; 

    function formatMillisecondsToHMS(milliseconds) {
        if (milliseconds < 0 || isNaN(milliseconds)) milliseconds = 0; 
        const totalSeconds = Math.floor(milliseconds / 1000);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function formatMillisecondsToHM(milliseconds) {
        if (milliseconds < 0 || isNaN(milliseconds)) milliseconds = 0;
        const totalMinutes = Math.floor(milliseconds / (1000 * 60));
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    }

    function calculateElapsedWorkTime(job) {
      if (!job || !job.startTime) return 0;
      const currentTime = new Date().getTime();
      let totalElapsed = currentTime - job.startTime;
      let effectivePausedDuration = job.totalPausedDuration || 0; 

      if (job.status === 'Paused' && job.pauseStartTime) {
        effectivePausedDuration += (currentTime - job.pauseStartTime);
      }
      return Math.max(0, totalElapsed - effectivePausedDuration); 
    }

    function startTimerDisplay() {
      if (timerInterval) clearInterval(timerInterval); 

      if (activeJob && (activeJob.status === 'Open' || activeJob.status === 'Paused')) {
        const elapsedTimeSpan = document.getElementById('elapsedTime');
        const totalPausedDurationSpan = document.getElementById('totalPausedDurationDisplay');
        
        const updateTimer = () => {
          const elapsed = calculateElapsedWorkTime(activeJob);
          elapsedTimeSpan.textContent = formatMillisecondsToHMS(elapsed);
          totalPausedDurationSpan.textContent = formatMillisecondsToHM(activeJob.totalPausedDuration);
        };

        updateTimer(); 
        if (activeJob.status === 'Open') {
          timerInterval = setInterval(updateTimer, 1000);
        }
      } else {
        document.getElementById('elapsedTime').textContent = '00:00:00';
        document.getElementById('totalPausedDurationDisplay').textContent = '00:00';
      }
    }

    function showFeedback(message, isSuccess = true) {
      const feedbackDiv = document.getElementById('feedback');
      feedbackDiv.textContent = message;
      feedbackDiv.classList.remove('hidden', 'feedback-success', 'feedback-error');
      feedbackDiv.classList.add(isSuccess ? 'feedback-success' : 'feedback-error');
      setTimeout(() => { feedbackDiv.classList.add('hidden'); }, 5000);
    }

    document.getElementById('logEditForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = e.target;
      const formData = {
        school: form.school.value,
        editor: form.editor.value,
        style: form.style.value,
        classes: form.classes.value,
        reedit: form.reedit.checked
      };

      if (!formData.school || !formData.editor || !formData.style || !formData.classes) {
          showFeedback('Please fill in all required fields.', false);
          return;
      }

      google.script.run
        .withSuccessHandler(function(rowNum) {
          showFeedback(`Job for ${formData.school} logged successfully.`, true);
          activeJob = {
            row: rowNum, 
            school: formData.school,
            editor: formData.editor,
            status: 'Open',
            startTime: new Date().getTime(),
            pauseStartTime: null, 
            totalPausedDuration: 0 
          };
          loadOpenJobsIntoSelect(); 
          updateSidebarDisplay(); 
          
          form.school.value = ''; 
          document.getElementById('schoolFilterInput').value = ''; 
          filterSchools(); 
          form.classes.value = 1;
          form.reedit.checked = false;
        })
        .withFailureHandler(function(error) {
          showFeedback(`Error: ${error.message}`, false);
        })
        .logEdit(formData);
    });

    document.getElementById('endJobButton').addEventListener('click', function() {
      if (!activeJob) return;
      if (!confirm(`End job for ${activeJob.school}?`)) return;

      google.script.run
        .withSuccessHandler(function(response) {
          showFeedback(response, true);
          activeJob = null; 
          loadOpenJobsIntoSelect(); 
        })
        .withFailureHandler(function(error) { showFeedback(error.message, false); })
        .endJob(activeJob.row); 
    });

    document.getElementById('pauseJobButton').addEventListener('click', function() {
      if (!activeJob || activeJob.status !== 'Open') return;
      google.script.run
        .withSuccessHandler(function(response) {
          showFeedback(response, true);
          activeJob.status = 'Paused'; 
          activeJob.pauseStartTime = new Date().getTime(); 
          updateSidebarDisplay(); 
          loadOpenJobsIntoSelect(); 
        })
        .withFailureHandler(function(error) { showFeedback(error.message, false); })
        .pauseJob(activeJob.row);
    });

    document.getElementById('resumeJobButton').addEventListener('click', function() {
      if (!activeJob || activeJob.status !== 'Paused') return;
      google.script.run
        .withSuccessHandler(function(response) {
          showFeedback(response, true);
          if (activeJob.pauseStartTime) {
            activeJob.totalPausedDuration = (activeJob.totalPausedDuration || 0) + (new Date().getTime() - activeJob.pauseStartTime);
          }
          activeJob.status = 'Open'; 
          activeJob.pauseStartTime = null; 
          updateSidebarDisplay(); 
          loadOpenJobsIntoSelect(); 
        })
        .withFailureHandler(function(error) { showFeedback(error.message, false); })
        .resumeJob(activeJob.row);
    });

    function loadOpenJobsIntoSelect() {
        google.script.run
            .withSuccessHandler(function(openJobsFromServer) {
                allOpenJobs = openJobsFromServer; 
                const activeJobSelect = document.getElementById('activeJobSelect');
                activeJobSelect.innerHTML = ''; 

                if (allOpenJobs.length === 0) {
                    const option = document.createElement('option');
                    option.value = "";
                    option.textContent = "No active jobs";
                    activeJobSelect.appendChild(option);
                    activeJob = null; 
                } else {
                    const defaultOption = document.createElement('option');
                    defaultOption.value = "";
                    defaultOption.textContent = "Select an active job...";
                    activeJobSelect.appendChild(defaultOption);

                    allOpenJobs.forEach((job, index) => {
                        const option = document.createElement('option');
                        option.value = index; 
                        option.textContent = `${job.school} (${job.editor})`;
                        if (job.status === 'Paused') {
                            option.textContent += " [PAUSED]";
                        }
                        activeJobSelect.appendChild(option);
                    });
                    
                    if (activeJob) {
                        const existingIndex = allOpenJobs.findIndex(job => job.row === activeJob.row);
                        if (existingIndex !== -1) {
                            activeJob = allOpenJobs[existingIndex]; 
                            activeJobSelect.value = existingIndex.toString();
                        } else {
                            activeJob = null;
                            activeJobSelect.value = "";
                        }
                    } else {
                         activeJobSelect.value = ""; 
                    }
                }
                updateSidebarDisplay(); 
            })
            .withFailureHandler(function(error) {
                console.error(error);
                showFeedback('Could not load active jobs.', false);
            })
            .getOpenJobs();
    }

    document.getElementById('activeJobSelect').addEventListener('change', function() {
        const selectedIndex = this.value;
        if (selectedIndex !== "") {
            activeJob = allOpenJobs[parseInt(selectedIndex)];
        } else {
            activeJob = null;
        }
        updateSidebarDisplay();
    });

    function updateSidebarDisplay() {
      const currentJobDetailsDiv = document.getElementById('currentJobDetails');
      const activeJobMessageP = document.getElementById('activeJobMessage');
      const activeJobStatusP = document.getElementById('activeJobStatus');
      const totalPausedDurationSpan = document.getElementById('totalPausedDurationDisplay'); 
      const pauseButton = document.getElementById('pauseJobButton');
      const resumeButton = document.getElementById('resumeJobButton');
      const endButton = document.getElementById('endJobButton');

      if (activeJob) {
        activeJobMessageP.classList.add('hidden');
        currentJobDetailsDiv.classList.remove('hidden');
        document.getElementById('activeJobSchool').textContent = activeJob.school;
        document.getElementById('activeJobEditor').textContent = activeJob.editor;
        
        activeJobStatusP.textContent = `Status: ${activeJob.status}`;
        activeJobStatusP.className = ''; 
        activeJobStatusP.classList.add('status-' + activeJob.status.toLowerCase()); 

        totalPausedDurationSpan.textContent = formatMillisecondsToHM(activeJob.totalPausedDuration); 

        endButton.classList.remove('hidden'); 

        if (activeJob.status === 'Open') {
          pauseButton.classList.remove('hidden');
          resumeButton.classList.add('hidden');
        } else if (activeJob.status === 'Paused') {
          pauseButton.classList.add('hidden');
          resumeButton.classList.remove('hidden');
        } 
        
        startTimerDisplay(); 
      } else {
        if (timerInterval) clearInterval(timerInterval); 
        document.getElementById('elapsedTime').textContent = '00:00:00';
        activeJobMessageP.classList.remove('hidden');
        currentJobDetailsDiv.classList.add('hidden');
      }
    }

    let allSchools = []; 
    function filterSchools() {
        const filterInput = document.getElementById('schoolFilterInput').value.toLowerCase();
        const schoolSelect = document.getElementById('schoolSelect');
        schoolSelect.innerHTML = ''; 

        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'Select a school...';
        schoolSelect.appendChild(defaultOption);

        const filteredSchools = allSchools.filter(school => school.toLowerCase().includes(filterInput));
        filteredSchools.forEach(school => {
            const option = document.createElement('option');
            option.value = school;
            option.textContent = school;
            schoolSelect.appendChild(option);
        });
        
        if(filterInput && filteredSchools.length > 0) {
             schoolSelect.value = filteredSchools[0];
        } else if (!filterInput) { 
            schoolSelect.value = '';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
      if (typeof componentHandler !== 'undefined') {
          componentHandler.upgradeDom();
      }

      google.script.run.withSuccessHandler(function(schools) {
        allSchools = schools;
        filterSchools();
      }).getSchoolsList();

      document.getElementById('schoolFilterInput').addEventListener('input', filterSchools);

      google.script.run.withSuccessHandler(function(editors) {
        const select = document.getElementById('editorSelect');
        editors.forEach(editor => {
          const option = document.createElement('option');
          option.value = editor;
          option.textContent = editor;
          select.appendChild(option);
        });
      }).getEditorsList();

      google.script.run.withSuccessHandler(function(styles) {
        const select = document.getElementById('styleSelect');
        styles.forEach(style => {
          const option = document.createElement('option');
          option.value = style;
          option.textContent = style;
          select.appendChild(option);
        });
      }).getShootStylesList();

      loadOpenJobsIntoSelect(); 
    });
  </script>
</body>
</html>
